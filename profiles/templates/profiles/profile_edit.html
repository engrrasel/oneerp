{% extends 'base.html' %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow-sm">

        <div class="card-body p-4">

            <div class="d-flex justify-content-between mb-4">

                <h3>

                    Edit Profile

                </h3>

                <a
                    href="{% url 'profile' %}"
                    class="btn btn-secondary">

                    Back

                </a>

            </div>

            <form
                method="POST"
                enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <input
                            type="text"
                            name="full_name"
                            class="form-control"
                            value="{{ profile.full_name }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Phone

                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            value="{{ profile.phone }}">

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Address

                    </label>

                    <textarea
                        name="address"
                        rows="3"
                        class="form-control">{{ profile.address }}</textarea>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            City

                        </label>

                        <input
                            type="text"
                            name="city"
                            class="form-control"
                            value="{{ profile.city }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Country

                        </label>

                        <input
                            type="text"
                            name="country"
                            class="form-control"
                            value="{{ profile.country }}">

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Profile Photo

                    </label>

                    <input
                        type="file"
                        name="profile_photo"
                        class="form-control">

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Profile

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
