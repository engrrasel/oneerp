{% extends 'auth_base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">
            Welcome Back
        </h2>

        <p class="auth-subtitle">
            Login to continue
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <label>
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username">

            </div>

            <div class="form-group">

                <label>
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password">

            </div>

            <button type="submit"
                    class="auth-btn">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="{% url 'register' %}">
                Register
            </a>

        </div>

    </div>

</div>

{% endblock %}
