{% extends 'auth_base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">
            Create Account
        </h2>

        <p class="auth-subtitle">
            Register your account
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <label>
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username">

            </div>

            <div class="form-group">

                <label>
                    Email
                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter email">

            </div>

            <div class="form-group">

                <label>
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password">

            </div>

            <button type="submit"
                    class="auth-btn">

                Register

            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
