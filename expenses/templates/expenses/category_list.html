{% extends 'base.html' %}

{% block title %}
Categories
{% endblock %}

{% block content %}

<div class="card p-4">

    <div class="d-flex justify-content-between mb-3">

        <h3>Categories</h3>

        <a href="{% url 'category_add' %}"
           class="btn btn-primary">

            Add Category

        </a>

    </div>

    <table class="table">

        <thead>

            <tr>

                <th>Name</th>

                <th>Type</th>

                <th width="180">
                    Actions
                </th>

            </tr>

        </thead>

        <tbody>

            {% for category in categories %}

            <tr>

                <td>{{ category.name }}</td>

                <td>{{ category.type|title }}</td>

                <td>

                    <a href="{% url 'category_edit' category.id %}"
                       class="btn btn-sm btn-warning">

                        Edit

                    </a>

                    <a href="{% url 'category_delete' category.id %}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this category?')">

                        Delete

                    </a>

                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="3">

                    No categories found.

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
