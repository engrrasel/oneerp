{% extends 'base.html' %}

{% block title %}
Add Category
{% endblock %}

{% block content %}

<div class="card p-4">

    <h3 class="mb-4">
        Add Category
    </h3>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Save Category

        </button>

    </form>

</div>

{% endblock %}
