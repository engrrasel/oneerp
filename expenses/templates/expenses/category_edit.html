{% extends 'base.html' %}

{% block title %}
Edit Category
{% endblock %}

{% block content %}

<div class="card p-4">

    <h3 class="mb-4">
        Edit Category
    </h3>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ category.name }}"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Type
            </label>

            <select
                name="category_type"
                class="form-select">

                <option value="income"
                    {% if category.type == 'income' %}
                    selected
                    {% endif %}>
                    Income
                </option>

                <option value="expense"
                    {% if category.type == 'expense' %}
                    selected
                    {% endif %}>
                    Expense
                </option>

            </select>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Update Category

        </button>

    </form>

</div>

{% endblock %}
