{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Expense Tracker{% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{% static 'css/base.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'css/sidebar.css' %}">

    <link
    rel="stylesheet"
    href="{% static 'css/navbar.css' %}">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    {% block extra_css %}
    {% endblock %}

</head>

<body>

<div class="layout">

    {% include 'includes/sidebar.html' %}

    <main class="main">

        {% include 'includes/navbar.html' %}

        <div class="page">

            {% block content %}
            {% endblock %}

        </div>

    </main>

</div>

<div
    id="overlay"
    class="sidebar-overlay">
</div>

<script src="{% static 'js/sidebar.js' %}"></script>

{% block extra_js %}
{% endblock %}

</body>
</html>
