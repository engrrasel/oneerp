{% extends 'base.html' %}

{% block title %}
Add Wallet
{% endblock %}

{% block content %}

<div class="card p-4">

    <h3 class="mb-4">
        Add Wallet
    </h3>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Wallet Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Wallet Type
            </label>

            <select
                name="wallet_type"
                id="walletType"
                class="form-select">

                <option value="cash">
                    Cash
                </option>

                <option value="bank">
                    Bank
                </option>

                <option value="mobile_banking">
                    Mobile Banking
                </option>

                <option value="card">
                    Card
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Opening Balance
            </label>

            <input
                type="number"
                step="0.01"
                min="0"
                name="opening_balance"
                class="form-control"
                value="0.00"
                required>

        </div>

        <!-- Bank Information -->

        <div id="bankFields" style="display:none;">

            <hr>

            <h5>
                Bank Information
            </h5>

            <div class="mb-3">

                <label class="form-label">
                    Bank Name
                </label>

                <input
                    type="text"
                    name="bank_name"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Branch Name
                </label>

                <input
                    type="text"
                    name="branch_name"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Account Name
                </label>

                <input
                    type="text"
                    name="account_name"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Account Number
                </label>

                <input
                    type="text"
                    name="account_number"
                    class="form-control">

            </div>

        </div>

        <!-- Mobile Banking -->

        <div id="mobileFields" style="display:none;">

            <hr>

            <h5>
                Mobile Banking Information
            </h5>

            <div class="mb-3">

                <label class="form-label">
                    Mobile Number
                </label>

                <input
                    type="text"
                    name="mobile_number"
                    class="form-control">

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Save Wallet

        </button>

    </form>

</div>

<script>

const walletType =
    document.getElementById(
        'walletType'
    );

const bankFields =
    document.getElementById(
        'bankFields'
    );

const mobileFields =
    document.getElementById(
        'mobileFields'
    );

function toggleFields() {

    bankFields.style.display =
        'none';

    mobileFields.style.display =
        'none';

    if (
        walletType.value === 'bank'
    ) {

        bankFields.style.display =
            'block';

    }

    if (
        walletType.value ===
        'mobile_banking'
    ) {

        mobileFields.style.display =
            'block';

    }

}

walletType.addEventListener(
    'change',
    toggleFields
);

toggleFields();

</script>

{% endblock %}
