{% extends 'base.html' %}

{% block title %}
Edit Transaction
{% endblock %}

{% block content %}

<div class="card p-4">

```
<div class="d-flex justify-content-between align-items-center mb-4">

    <h3>
        Edit Transaction
    </h3>

    <a
        href="{% url 'transaction_list' %}"
        class="btn btn-secondary">

        Back

    </a>

</div>

<form method="POST">

    {% csrf_token %}

    <!-- Transaction Type -->

    <div class="mb-3">

        <label class="form-label">
            Type
        </label>

        <select
            name="transaction_type"
            class="form-select"
            required>

            <option
                value="income"
                {% if transaction.transaction_type == 'income' %}
                selected
                {% endif %}>

                Income

            </option>

            <option
                value="expense"
                {% if transaction.transaction_type == 'expense' %}
                selected
                {% endif %}>

                Expense

            </option>

        </select>

    </div>

    <!-- Wallet -->

    <div class="mb-3">

        <label class="form-label">
            Wallet
        </label>

        <select
            name="wallet"
            class="form-select"
            required>

            {% for wallet in wallets %}

            <option
                value="{{ wallet.id }}"
                {% if wallet.id == transaction.wallet.id %}
                selected
                {% endif %}>

                {{ wallet.name }}

            </option>

            {% endfor %}

        </select>

    </div>

    <!-- Category -->

    <div class="mb-3">

        <label class="form-label">
            Category
        </label>

        <select
            name="category"
            class="form-select"
            required>

            {% for category in categories %}

            <option
                value="{{ category.id }}"
                {% if category.id == transaction.category.id %}
                selected
                {% endif %}>

                {{ category.name }}

            </option>

            {% endfor %}

        </select>

    </div>

    <!-- Amount -->

    <div class="mb-3">

        <label class="form-label">
            Amount
        </label>

        <input
            type="number"
            step="0.01"
            min="0.01"
            name="amount"
            class="form-control"
            value="{{ transaction.amount }}"
            required>

    </div>

    <!-- Date -->

    <div class="mb-3">

        <label class="form-label">
            Date
        </label>

        <input
            type="date"
            name="transaction_date"
            class="form-control"
            value="{{ transaction.transaction_date|date:'Y-m-d' }}"
            required>

    </div>

    <!-- Note -->

    <div class="mb-3">

        <label class="form-label">
            Note
        </label>

        <textarea
            name="note"
            class="form-control"
            rows="3">{{ transaction.note }}</textarea>

    </div>

    <button
        type="submit"
        class="btn btn-primary">

        Update Transaction

    </button>

</form>
```

</div>

{% endblock %}
