{% extends 'base.html' %}

{% block title %}
Add Transaction
{% endblock %}

{% block content %}

<div class="card p-4">

    <h3 class="mb-4">
        Add Transaction
    </h3>

    <form method="POST">

        {% csrf_token %}

        <!-- Transaction Type -->

        <div class="mb-3">

            <label class="form-label">
                Type
            </label>

            <select
                name="transaction_type"
                class="form-select"
                required>

                <option value="income">
                    Income
                </option>

                <option value="expense">
                    Expense
                </option>

            </select>

        </div>

        <!-- Account -->

        <div class="mb-3">

            <label class="form-label">
                Wallet
            </label>

            <select
                name="wallet"
                class="form-select"
                required>

                <option value="">
                    Select Wallet
                </option>

                {% for wallet in wallets %}

                <option value="{{ wallet.id }}">
                    {{ wallet.name }}
                </option>

                {% endfor %}

            </select>

        </div>

        <!-- Category -->

        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <select
                name="category"
                class="form-select"
                required>

                <option value="">
                    Select Category
                </option>

                {% for category in categories %}

                <option value="{{ category.id }}">
                    {{ category.name }}
                </option>

                {% endfor %}

            </select>

        </div>

        <!-- Amount -->

        <div class="mb-3">

            <label class="form-label">
                Amount
            </label>

            <input
                type="number"
                step="0.01"
                min="0.01"
                name="amount"
                class="form-control"
                required>

        </div>

        <!-- Date -->

        <div class="mb-3">

            <label class="form-label">
                Date
            </label>

            <input
                type="date"
                name="transaction_date"
                class="form-control"
                required>

        </div>

        <!-- Note -->

        <div class="mb-3">

            <label class="form-label">
                Note
            </label>

            <textarea
                name="note"
                class="form-control"
                rows="3"></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Save Transaction

        </button>

    </form>

</div>

{% endblock %}
